<!DOCTYPE html>
<html>
<head>
  <title>Airport Pathfinder</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.7.1/dist/leaflet.css" />
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <h1>Airport Pathfinder</h1>
    <div class="controls">
      <button id="calculate-mst">Show MST</button>
      <button id="calculate-tsp">Show Shortest Path</button>
      <button id="clear">Clear All</button>
      <div id="status">Select airports to begin</div>
    </div>
    <div id="map"></div>
  </div>

  <script src="https://unpkg.com/leaflet@1.7.1/dist/leaflet.js"></script>
  <script src="https://unpkg.com/leaflet-arrowheads@1.3.0/dist/leaflet-arrowheads.js"></script>
  <script src="script.js"></script>
</body>
</html>
